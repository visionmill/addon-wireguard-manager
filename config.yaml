name: "WireGuard Wizard"
version: "0.2.2"
slug: "wireguard_wizard"
description: "PiVPN-style WireGuard setup wizard for Home Assistant OS"
url: "https://github.com/visionmill/addon-wireguard-manager"
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:vpn
panel_title: WireGuard Wizard
host_network: true
privileged:
  - NET_ADMIN
ports:
  51820/udp: 51820
ports_description:
  51820/udp: WireGuard VPN
map:
  - config:rw
options:
  web_port: 8099
  wg_port: 51820
schema:
  web_port: port
  wg_port: port
